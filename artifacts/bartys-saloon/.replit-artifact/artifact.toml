kind = "web"
previewPath = "/"
title = "Barty's Saloon"
version = "1.0.0"
id = "artifacts/bartys-saloon"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20736

[services.development]
run = "pnpm --filter @workspace/bartys-saloon run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bartys-saloon", "run", "build" ]
publicDir = "artifacts/bartys-saloon/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20736"
BASE_PATH = "/"
